<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="&nbsp;">
<meta name="theme-color" content="#FAFBFB">
<title>Palier</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23FAFBFB'/%3E%3Crect x='11' y='7' width='3' height='18' rx='1.5' fill='%230F766E'/%3E%3Crect x='18' y='13' width='3' height='12' rx='1.5' fill='%23A8761F'/%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="icon.png">
<style>
  :root{
    --paper:#FAFBFB; --ink:#15211F; --muted:#8A9694; --faint:#B9C2C0;
    --hair:rgba(21,33,31,.10); --hair2:rgba(21,33,31,.06);
    --track:#ECEEED; --pat:#0F766E; --money:#A8761F;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0}
  html,body{height:100%;overflow:hidden}
  body{
    background:var(--paper);color:var(--ink);
    font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    font-feature-settings:"tnum" 1;-webkit-font-smoothing:antialiased;
    max-width:440px;margin:0 auto;
  }
  .snap-wrap{
    height:100svh;overflow-y:scroll;
    scroll-snap-type:y mandatory;
    -webkit-overflow-scrolling:touch;
    scrollbar-width:none;
  }
  .snap-wrap::-webkit-scrollbar{display:none}
  .snap-page{
    scroll-snap-align:start;
    min-height:100svh;
    padding:max(18px,env(safe-area-inset-top)) 24px 12px;
    box-sizing:border-box;
  }
  .page-stats{
    padding-top:32px;
    padding-bottom:calc(24px + env(safe-area-inset-bottom));
  }
  .scroll-hint{
    display:flex;flex-direction:column;align-items:center;gap:4px;
    padding-top:10px;color:var(--faint);font-size:9.5px;letter-spacing:.12em;
    text-transform:uppercase;
  }
  .scroll-hint svg{animation:bounce .9s ease-in-out infinite alternate}
  @keyframes bounce{from{transform:translateY(0)}to{transform:translateY(5px)}}
  .eyebrow{font-size:10px;letter-spacing:.26em;text-transform:uppercase;color:var(--faint);font-weight:600}
  h1{font-family:"Instrument Serif",Georgia,serif;font-weight:400;font-size:40px;line-height:.95;margin:8px 0 0;letter-spacing:.01em}
  .sub{color:var(--muted);font-size:13px;margin:6px 0 34px}

  /* header bar avec gear */
  .topbar{display:flex;justify-content:flex-end;margin-bottom:4px;}
  .btn-gear{background:none;border:none;color:var(--faint);font-size:26px;cursor:pointer;
            padding:2px 4px;border-radius:8px;transition:color .18s;line-height:1;}
  .btn-gear:active{color:var(--ink);}

  /* hero */
  .heads{display:grid;grid-template-columns:1fr 1fr;gap:28px;align-items:end;margin-top:4px}
  .head .tag{font-size:10px;letter-spacing:.2em;text-transform:uppercase;font-weight:600;color:var(--muted)}
  .head.money{text-align:right}
  .head .num{font-family:"Instrument Serif",serif;font-size:42px;line-height:1;margin-top:4px;letter-spacing:.01em}
  .head.pat .num{color:var(--pat)} .head.money .num{color:var(--money)}
  .head .cap{font-size:11px;color:var(--faint);margin-top:3px}

  .gauges{display:grid;grid-template-columns:1fr 72px 1fr;gap:12px;height:270px;margin:10px 0 0}
  .col{position:relative;height:100%}
  .track{position:absolute;left:50%;transform:translateX(-50%);width:58px;height:100%;
         background:var(--track);border-radius:14px;overflow:hidden}
  .fill{position:absolute;left:0;right:0;bottom:0;height:0%;
        transition:height .65s cubic-bezier(.22,1,.36,1)}
  .fill.pat{background:var(--pat)} .fill.money{background:var(--money)}
  .rule{position:absolute;left:0;right:0;border-top:1px solid rgba(255,255,255,.35);z-index:2}
  .rule.pat,.rule.money{border-top-color:rgba(21,33,31,.16)}
  .rule.pat.on,.rule.money.on{border-top-color:rgba(255,255,255,.55)}
  .rule.cur{border-top-width:2px}
  .rule.pat.cur{border-top-color:#fff} .rule.money.cur{border-top-color:#fff}
  .labs{position:absolute;inset:0;pointer-events:none}
  .plab{position:absolute;font-size:9.5px;line-height:1;color:var(--faint);white-space:nowrap;
        transform:translateY(-50%);transition:color .3s,font-weight .3s}
  .labs.left .plab{right:calc(50% + 37px);text-align:right}
  .labs.right .plab{left:calc(50% + 37px);text-align:left}
  .plab.on{color:var(--muted)}
  .labs.left .plab.cur{color:var(--pat);font-weight:600}
  .labs.right .plab.cur{color:var(--money);font-weight:600}

  /* next palier */
  .next{display:flex;justify-content:space-between;align-items:baseline;gap:14px;
        padding:10px 0;margin:12px 0 0;border-top:1px solid var(--hair)}
  .next .lab{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);font-weight:600}
  .next .big{font-family:"Instrument Serif",serif;font-size:22px;margin-top:4px}
  .next .gap{text-align:right;font-size:12px;color:var(--muted);line-height:1.6}
  .next .gap b{color:var(--ink);font-weight:600}

  /* paliers */
  .paliers{border-top:1px solid var(--hair);margin-bottom:32px}
  .chip{display:flex;justify-content:space-between;align-items:center;gap:12px;
        padding:11px 0;border-bottom:1px solid var(--hair2)}
  .chip .nm{font-family:"Instrument Serif",serif;font-size:17px;color:var(--faint);transition:color .3s}
  .chip .vv{font-size:11px;color:var(--faint);margin-top:0}
  .chip.done .nm{color:var(--ink)}
  .chip .st{display:flex;gap:6px}
  .dot{width:7px;height:7px;border-radius:50%;border:1px solid var(--faint)}
  .dot.pat.on{background:var(--pat);border-color:var(--pat)}
  .dot.money.on{background:var(--money);border-color:var(--money)}

  /* inputs */
  .block{margin-bottom:14px}
  .block h2{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);font-weight:600;margin:0 0 16px}
  .prow{display:flex;align-items:center;gap:14px}
  .tap{flex:1;border:none;background:var(--pat);color:#fff;border-radius:99px;padding:16px 0;
       font-family:inherit;font-size:16px;font-weight:600;cursor:pointer;transition:transform .08s,opacity .2s}
  .tap:active{transform:scale(.97);opacity:.9}
  .mini{width:46px;height:46px;border-radius:99px;border:1px solid var(--hair);background:none;color:var(--ink);
        font-family:inherit;font-size:18px;font-weight:500;cursor:pointer;transition:transform .08s,background .2s}
  .mini:active{transform:scale(.92);background:var(--hair2)} .mini.plus5{font-size:14px;font-weight:600}
  .moneyrow{display:flex}
  .moneyrow input{width:100%;border:1.5px solid var(--money);background:rgba(168,118,31,.06);
        color:var(--ink);font-family:inherit;font-size:17px;padding:15px 16px;border-radius:14px;min-width:0}
  .moneyrow input::placeholder{color:var(--faint)}
  .moneyrow input:focus{outline:none;border-color:var(--money);box-shadow:0 0 0 3px rgba(168,118,31,.14)}
  .today{margin-top:14px;font-size:12px;color:var(--muted)} .today b{color:var(--ink);font-weight:600}

  /* stats */
  .stats{display:flex;flex-direction:column;justify-content:space-evenly;
         height:calc(100svh - max(26px,env(safe-area-inset-top)) - calc(24px + env(safe-area-inset-bottom)))}
  .stat-row{display:flex;justify-content:space-between;align-items:center;
            padding:24px 0;border-bottom:1px solid var(--hair2)}
  .stat-row:last-child{border-bottom:none}
  .stat-row .left .v{font-family:"Instrument Serif",serif;font-size:48px;line-height:1}
  .stat-row .left .k{font-size:10px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-top:6px}
  .stat-row .right{text-align:right}
  .stat-row-title{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-weight:600;text-align:right;margin-bottom:10px}
  .pal-list{display:flex;flex-direction:column;gap:6px;}
  .pal-item{text-align:right;margin-left:auto;transition:all .2s}
  .pal-item .pn{font-size:12px;font-weight:600;color:var(--faint)}
  .pal-item .pr{font-size:10px;color:var(--faint);margin-top:1px}
  .pal-item.on{text-align:left;margin-left:0;width:100%;background:rgba(15,118,110,.08);
               border-left:3px solid var(--pat);border-radius:0 6px 6px 0;padding:5px 10px 5px 8px}
  .pal-item.on .pn{color:var(--pat);font-weight:700}
  .pal-item.next .pn{color:var(--ink)}
  .pal-item.next .pr{color:var(--muted)}

  details{margin-bottom:8px}
  summary{cursor:pointer;list-style:none;padding:6px 0 14px;font-size:10px;letter-spacing:.2em;text-transform:uppercase;
          color:var(--muted);font-weight:600;display:flex;justify-content:space-between}
  summary::-webkit-details-marker{display:none}
  .hrow{position:relative;overflow:hidden;border-top:1px solid var(--hair2)}
  .hactions{position:absolute;top:0;right:0;bottom:0;display:flex;z-index:0}
  .hmod,.hdel{width:82px;border:none;font-family:inherit;font-size:13px;font-weight:600;color:#fff;cursor:pointer}
  .hmod{background:var(--muted)} .hdel{background:#C0493B}
  .hitem{position:relative;z-index:1;background:var(--paper);display:flex;justify-content:space-between;
         align-items:center;padding:13px 2px;font-size:14px;touch-action:pan-y;will-change:transform}
  .hitem .d{color:var(--muted);font-size:12px}
  .hitem .vals{display:flex;gap:16px;align-items:center}
  .hitem .pp{color:var(--pat);font-weight:600} .hitem .mm{color:var(--money);font-weight:600}
  .empty{color:var(--faint);font-size:13px;padding:16px 0;text-align:center}
  .reset{width:100%;background:none;border:none;color:var(--faint);font-family:inherit;font-size:12px;
         letter-spacing:.04em;cursor:pointer;padding:16px 0 4px}
  .modal{position:fixed;inset:0;background:rgba(21,33,31,.45);display:flex;align-items:flex-end;justify-content:center;z-index:50}
  .modal[hidden]{display:none}
  .sheet{background:var(--paper);width:100%;max-width:440px;border-radius:22px 22px 0 0;
         padding:24px 22px calc(24px + env(safe-area-inset-bottom));animation:rise .25s cubic-bezier(.22,1,.36,1)}
  @keyframes rise{from{transform:translateY(40px);opacity:.4}to{transform:translateY(0);opacity:1}}
  .sheet h3{font-family:"Instrument Serif",serif;font-weight:400;font-size:32px;margin:0 0 10px;letter-spacing:.01em;}
  .sheet label{display:block;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);font-weight:600;margin:16px 0 7px}
  .sheet input{width:100%;border:1px solid var(--hair);border-radius:12px;background:none;color:var(--ink);
               font-family:inherit;font-size:17px;padding:13px 14px;
               -webkit-appearance:none;appearance:none;box-sizing:border-box;}
  .sheet input:focus{outline:none;border-color:var(--ink)}
  .acts{display:flex;gap:10px;margin-top:24px}
  .btnp{flex:1;border:none;border-radius:99px;padding:15px;font-family:inherit;font-size:15px;font-weight:600;cursor:pointer}
  .btnp.save{background:var(--pat);color:#fff} .btnp.del2{background:#C0493B;color:#fff}
  .btnp.ghost{background:none;border:1px solid var(--hair);color:var(--ink)}
  .btnp.del{width:100%;margin-top:10px;background:none;color:#C0493B;border:1px solid rgba(192,73,59,.4)}

  /* settings sheet spécifique */
  .cfg-sheet{max-height:88svh;overflow:hidden;display:flex;flex-direction:column;padding-bottom:0;}
  .cfg-body{overflow-y:auto;-webkit-overflow-scrolling:touch;flex:1;padding:0 0 8px;}
  .cfg-footer{padding:16px 0 calc(16px + env(safe-area-inset-bottom));border-top:1px solid var(--hair2);flex-shrink:0;}
  .cfg-sec{font-size:9.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--pat);font-weight:600;
           margin:18px 0 10px;padding-bottom:6px;border-bottom:1px solid rgba(15,118,110,.15);}
  .cfg-sec:first-child{margin-top:4px;}
  .obj-edit-row{display:flex;align-items:center;gap:7px;margin-bottom:9px;}
  .obj-edit-row input{border:1px solid var(--hair);border-radius:10px;background:none;color:var(--ink);
                      font-family:inherit;font-size:15px;padding:11px 13px;
                      -webkit-appearance:none;appearance:none;box-sizing:border-box;
                      flex:1;min-width:0;}
  .obj-edit-row input:focus{outline:none;border-color:var(--pat)}
  .obj-del-btn{background:none;border:none;color:#C0493B;font-size:17px;cursor:pointer;padding:6px;flex-shrink:0;}
  .btn-add-row{width:100%;background:none;border:1px dashed var(--faint);color:var(--muted);border-radius:11px;
               padding:11px;font-family:inherit;font-size:13px;cursor:pointer;margin-top:2px;transition:border-color .2s,color .2s;}
  .btn-add-row:active{border-color:var(--pat);color:var(--pat);}
  .cfg-params{display:flex;flex-direction:column;gap:0;}
  .cfg-param{display:flex;align-items:center;justify-content:space-between;gap:14px;
             padding:10px 0;border-bottom:1px solid var(--hair2);}
  .cfg-param:last-child{border-bottom:none;}
  .cfg-param .cfg-lbl{font-size:13px;color:var(--ink);flex:1;margin:0;}
  .cfg-param input{width:96px;flex-shrink:0;border:1px solid var(--hair);border-radius:10px;
                   background:none;color:var(--ink);font-family:inherit;font-size:14px;
                   padding:9px 11px;text-align:right;
                   -webkit-appearance:none;appearance:none;box-sizing:border-box;}
  .cfg-param input:focus{outline:none;border-color:var(--pat);}

  .day-ring-col{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px}
  .day-ring-svg{transform:rotate(-90deg)}
  .day-ring-track{fill:none;stroke:var(--track);stroke-width:5}
  .day-ring-arc{fill:none;stroke:#C0493B;stroke-width:5;stroke-linecap:round;
                transition:stroke-dashoffset .8s cubic-bezier(.22,1,.36,1)}
  @media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>
<div class="snap-wrap">
  <!-- PAGE 1 : principal -->
  <div class="snap-page page-main">
  <div class="topbar">
    <button class="btn-gear" id="btnSettings" aria-label="Réglages">⚙&#xFE0E;</button>
  </div>
  <div class="heads">
    <div class="head pat"><div class="tag">Patients</div><div class="num" id="patNum">0</div></div>
    <div class="head money"><div class="tag">Argent</div><div class="num" id="moneyNum">0&nbsp;€</div></div>
  </div>

  <div class="gauges">
    <div class="col"><div class="track"><div id="fillPat" class="fill pat"></div><div id="marksPat"></div></div><div class="labs left" id="labsPat"></div></div>
    <div class="day-ring-col">
      <svg width="68" height="68" viewBox="0 0 68 68">
        <circle class="day-ring-track" cx="34" cy="34" r="30"/>
        <circle class="day-ring-arc" id="dayArc" cx="34" cy="34" r="30"
          stroke-dasharray="188.5" stroke-dashoffset="0"
          transform="rotate(-90 34 34)"/>
        <text id="daysLeftNum" x="34" y="34" text-anchor="middle" dominant-baseline="central"
          font-family="Instrument Serif,serif" font-size="15" fill="var(--ink)">—</text>
      </svg>
    </div>
    <div class="col"><div class="track"><div id="fillMoney" class="fill money"></div><div id="marksMoney"></div></div><div class="labs right" id="labsMoney"></div></div>
  </div>

  <div class="next">
    <div><div class="big" id="nextName">—</div></div>
    <div class="gap" id="nextGap"></div>
  </div>

  <div class="block">
    <h2>Patients vus</h2>
    <div class="prow">
      <button class="mini" id="minus" aria-label="Retirer un patient">–</button>
      <button class="tap" id="plus1">+1 patient</button>
      <button class="mini plus5" id="plus5" aria-label="Ajouter cinq patients">+5</button>
    </div>
    <div class="today">Aujourd'hui · <b id="todayPat">0</b> patients</div>
  </div>

  <div class="block">
    <h2>Argent encaissé</h2>
    <div class="moneyrow">
      <input id="moneyInput" type="number" inputmode="decimal" placeholder="Montant rétrocession (€)" min="0" step="1">
    </div>
    <div class="today">Aujourd'hui · <b id="todayMoney">0&nbsp;€</b></div>
  </div>

    <div class="scroll-hint">
      <svg width="12" height="8" viewBox="0 0 12 8" fill="none"><path d="M1 1l5 5 5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
    </div>
  </div><!-- /page-main -->

  <!-- PAGE 2 : STATS -->
  <div class="snap-page page-stats">
  <div class="stats">

    <div class="stat-row">
      <div class="left">
        <div class="v" id="sAvg">—</div>
        <div class="k">Moy. patients/j</div>
      </div>
      <div class="right">
        <div class="stat-row-title">Objectif patients</div>
        <div class="pal-list" id="palPat"></div>
      </div>
    </div>

    <div class="stat-row">
      <div class="left">
        <div class="v" id="sEurPat">—</div>
        <div class="k">Moy. € / jour</div>
      </div>
      <div class="right">
        <div class="stat-row-title">Objectif €</div>
        <div class="pal-list" id="palMon"></div>
      </div>
    </div>

  </div>
  </div><!-- /page-stats -->

  <!-- PAGE 3 : HISTORIQUE -->
  <div class="snap-page page-stats">
  <div style="display:flex;align-items:center;justify-content:space-between;padding:0 0 14px;">
    <span style="font-size:10px;letter-spacing:.2em;text-transform:uppercase;font-weight:600;color:var(--muted);">Historique <span id="histCount" style="font-weight:400;opacity:.6;"></span></span>
    <button id="btnAddDay" style="background:none;border:1px solid var(--hair);color:var(--muted);font-size:13px;font-weight:600;padding:3px 12px;border-radius:99px;cursor:pointer;font-family:inherit;letter-spacing:.04em;">+ Ajouter</button>
  </div>
  <div id="hist"></div>
  </div><!-- /page-hist -->

</div><!-- /snap-wrap -->

<div id="modal" class="modal" hidden><div class="sheet" id="sheet"></div></div>

<script>
(function(){
  "use strict";

  /* ── VALEURS PAR DÉFAUT ─────────────────────────────── */
  var DPARAMS = {
    base:46510, jours:127, netParConsult:24,
    tauxURSSAF:0.12, tauxCARMF:0.12, abattement:0.34,
    baseImposableAcquise:36444, plafond30:84577
  };
  var DOBJ = [
    {id:"1", nom:"−5 000 €",  offset:-5000 },
    {id:"2", nom:"0 €",       offset:0     },
    {id:"3", nom:"+5 000 €",  offset:5000  },
    {id:"4", nom:"+10 000 €", offset:10000 },
    {id:"5", nom:"+15 000 €", offset:15000 }
  ];

  /* ── ÉTAT ───────────────────────────────────────────── */
  var KEY_DAYS = "paliers_v1";
  var KEY_CFG  = "paliers_cfg_v1";
  var state    = {days:{}};
  var cfg      = { params: copy(DPARAMS), objectifs: DOBJ.map(copy) };
  var editOb   = [], editPtmp = {};

  function copy(o){ return JSON.parse(JSON.stringify(o)); }

  /* ── PERSISTENCE ────────────────────────────────────── */
  function loadAll(){
    try{ var r=localStorage.getItem(KEY_DAYS); if(r){state=JSON.parse(r);if(!state.days)state.days={};} }catch(e){}
    try{
      var c=localStorage.getItem(KEY_CFG);
      if(c){
        var s=JSON.parse(c);
        if(s.params)   cfg.params   = Object.assign({},DPARAMS,s.params);
        if(s.objectifs && s.objectifs.length) cfg.objectifs = s.objectifs;
      }
    }catch(e){}
  }
  function saveData(){ try{localStorage.setItem(KEY_DAYS,JSON.stringify(state));}catch(e){} }
  function saveCfg(){  try{localStorage.setItem(KEY_CFG, JSON.stringify(cfg));}  catch(e){} }

  /* ── CALCUL NET→BRUT ────────────────────────────────── */
  function netDeBrut(G, p){
    var bi   = G*(1-p.abattement);
    var urss = bi*p.tauxURSSAF;
    var carm = bi*p.tauxCARMF;
    var tot  = p.baseImposableAcquise+bi;
    var i30  = Math.max(0, Math.min(tot,p.plafond30)-p.baseImposableAcquise);
    var i41  = Math.max(0, tot-p.plafond30);
    return G - urss - carm - 0.30*i30 - 0.41*i41;
  }
  function brutDeNet(netV, p){
    var lo=0, hi=2000000;
    for(var i=0;i<80;i++){ var m=(lo+hi)/2; if(netDeBrut(m,p)<netV)lo=m;else hi=m; }
    return (lo+hi)/2;
  }
  function calcPaliers(){
    var p=cfg.params;
    return cfg.objectifs.map(function(o){
      var brut=brutDeNet(p.base+o.offset,p);
      var pat =Math.round(brut/p.netParConsult);
      return {nom:o.nom, offset:o.offset, brut:brut, pat:pat,
              patJ:pat/p.jours, eurJ:brut/p.jours};
    });
  }

  /* ── FORMAT ─────────────────────────────────────────── */
  var nfI=new Intl.NumberFormat("fr-FR");
  var nfE=new Intl.NumberFormat("fr-FR",{style:"currency",currency:"EUR",maximumFractionDigits:0});
  function fI(n){ return nfI.format(Math.round(n)); }
  function fE(n){ return nfE.format(Math.round(n)).replace(/ /g," "); }
  function fD(n){ return (Math.round(n*10)/10).toFixed(1).replace(".",","); }
  function fK(v){ var n=v/1000; return (n%1?n.toFixed(1).replace(".",","):n)+" k€"; }
  function esc(s){ return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

  /* ── HELPERS ÉTAT ───────────────────────────────────── */
  function todayKey(){ var d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
  function totals(){
    var p=0,m=0,days=0;
    for(var k in state.days){ var e=state.days[k]; p+=e.patients||0; m+=e.money||0; if((e.patients||0)>(0)||(e.money||0)>0)days++; }
    return {p:p,m:m,days:days};
  }
  function day(){ var k=todayKey(); if(!state.days[k])state.days[k]={patients:0,money:0}; return state.days[k]; }
  function calcDaysLeft(){
    var holidays=["2026-07-14","2026-11-11","2026-12-25"];
    var start=new Date(2026,5,12); start.setHours(0,0,0,0);
    var today=new Date(); today.setHours(0,0,0,0);
    var elapsed=0, d=new Date(start);
    while(d<today){ var dow=d.getDay(),iso=d.toISOString().slice(0,10); if(dow!==0&&dow!==6&&!holidays.includes(iso))elapsed++; d.setDate(d.getDate()+1); }
    return Math.max(0, cfg.params.jours-elapsed);
  }

  /* ── RENDU MARQUES ──────────────────────────────────── */
  function buildMarks(t, paliers){
    var PMAX=paliers.length?paliers[paliers.length-1].pat :1;
    var MMAX=paliers.length?paliers[paliers.length-1].brut:1;
    var H=250, minGap=15;
    function go(prefix,cls,key,total,max,targetVal,fmt){
      var marks=document.getElementById("marks"+prefix), labs=document.getElementById("labs"+prefix);
      if(!marks||!labs)return;
      marks.innerHTML=""; labs.innerHTML="";
      var items=paliers.map(function(pl){ return {v:pl[key], y:(1-pl[key]/max)*H, on:total>=pl[key], cur:pl[key]===targetVal&&total<pl[key]}; });
      items.forEach(function(it){ var m=document.createElement("div"); m.className="rule "+cls+(it.on?" on":"")+(it.cur?" cur":""); m.style.top=it.y+"px"; marks.appendChild(m); });
      var s=items.slice().sort(function(a,b){return a.y-b.y;});
      for(var i=1;i<s.length;i++){if(s[i].y-s[i-1].y<minGap)s[i].y=s[i-1].y+minGap;}
      s.forEach(function(it){ var l=document.createElement("div"); l.className="plab"+(it.on?" on":"")+(it.cur?" cur":""); l.style.top=it.y+"px"; l.textContent=fmt(it.v); labs.appendChild(l); });
    }
    var ptgt=PMAX, mtgt=MMAX;
    for(var i=0;i<paliers.length;i++){if(t.p<paliers[i].pat) {ptgt=paliers[i].pat; break;}}
    for(var i=0;i<paliers.length;i++){if(t.m<paliers[i].brut){mtgt=paliers[i].brut;break;}}
    go("Pat",  "pat",  "pat", t.p,PMAX,ptgt,fI);
    go("Money","money","brut",t.m,MMAX,mtgt,fK);
  }

  /* ── RENDU PRINCIPAL ────────────────────────────────── */
  function render(){
    var paliers=calcPaliers();
    var PMAX=paliers.length?paliers[paliers.length-1].pat :1;
    var MMAX=paliers.length?paliers[paliers.length-1].brut:1;
    var t=totals(), d=day(), daysLeft=calcDaysLeft();

    document.getElementById("fillPat").style.height   =Math.min(100,t.p/PMAX*100)+"%";
    document.getElementById("fillMoney").style.height =Math.min(100,t.m/MMAX*100)+"%";
    document.getElementById("patNum").textContent     =fI(t.p);
    document.getElementById("moneyNum").innerHTML     =fE(t.m);
    document.getElementById("todayPat").textContent   =fI(d.patients);
    document.getElementById("todayMoney").innerHTML   =fE(d.money);

    var arc=document.getElementById("dayArc");
    if(arc){var C=188.5;arc.setAttribute("stroke-dashoffset",(C*daysLeft/cfg.params.jours).toFixed(1));}
    document.getElementById("daysLeftNum").textContent=daysLeft;

    var avg=t.days?(Math.round(t.p/t.days*10)/10):0;
    document.getElementById("sAvg").textContent=t.days?fD(avg):"—";
    var eurJ=t.days>0?Math.round(t.m/t.days):null;
    document.getElementById("sEurPat").textContent=eurJ?fE(eurJ):"—";

    /* OBJECTIF PATIENTS — rythme en pts/j */
    var elPP=document.getElementById("palPat");
    if(elPP){
      elPP.innerHTML=""; var fn1=true;
      paliers.forEach(function(pl){
        var onPace=t.days>0&&avg>=pl.patJ;
        var rate=daysLeft>0?fD(Math.max(0,(pl.pat-t.p)/daysLeft))+" pts/j":"—";
        var div=document.createElement("div");
        div.className="pal-item"+(onPace?" on":(fn1?" next":""));
        div.innerHTML='<div class="pn">'+(onPace?"✓ ":(fn1?"→ ":''))+esc(pl.nom)+'</div><div class="pr">'+rate+'</div>';
        elPP.appendChild(div); if(!onPace)fn1=false;
      });
    }

    /* OBJECTIF € — patients/j nécessaires pour atteindre la somme cible */
    var elPM=document.getElementById("palMon");
    if(elPM){
      elPM.innerHTML=""; var fn2=true;
      var monAvg=t.days>0?t.m/t.days:0;
      paliers.forEach(function(pl){
        var onPace=t.days>0&&monAvg>=pl.eurJ;
        var patsLeft=Math.max(0,(pl.brut-t.m)/cfg.params.netParConsult);
        var rate=daysLeft>0?fD(patsLeft/daysLeft)+" pts/j":"—";
        var div=document.createElement("div");
        div.className="pal-item"+(onPace?" on":(fn2?" next":""));
        div.innerHTML='<div class="pn">'+(onPace?"✓ ":(fn2?"→ ":''))+esc(pl.nom)+'</div><div class="pr">'+rate+'</div>';
        elPM.appendChild(div); if(!onPace)fn2=false;
      });
    }

    /* prochain palier */
    var np=null;
    for(var i=0;i<paliers.length;i++){if(t.p<paliers[i].pat||t.m<paliers[i].brut){np=paliers[i];break;}}
    if(np){
      document.getElementById("nextName").textContent=np.nom;
      document.getElementById("nextGap").innerHTML="encore <b>"+fI(Math.max(0,np.pat-t.p))+"</b> patients<br>et <b>"+fE(Math.max(0,np.brut-t.m))+"</b>";
    }else{
      document.getElementById("nextName").textContent="Tout est atteint";
      document.getElementById("nextGap").innerHTML="les "+paliers.length+" paliers<br>sont franchis ✓";
    }

    buildMarks(t,paliers);
    renderHist();
    saveData();
  }

  /* ── HISTORIQUE ─────────────────────────────────────── */
  function renderHist(){
    var keys=Object.keys(state.days).filter(function(k){var e=state.days[k];return(e.patients||0)||(e.money||0);}).sort();
    document.getElementById("histCount").textContent=keys.length?keys.length+" jours":"";
    var box=document.getElementById("hist");
    if(!keys.length){box.innerHTML='<div class="empty">Aucune entrée. Note ton premier patient ci-dessus.</div>';return;}
    box.innerHTML="";
    keys.forEach(function(k){
      var e=state.days[k];var p=k.split("-");var dd=new Date(p[0],p[1]-1,p[2]);
      var lbl=dd.toLocaleDateString("fr-FR",{weekday:"short",day:"numeric",month:"short"});
      var row=document.createElement("div");row.className="hrow";
      row.innerHTML='<div class="hactions"><button class="hmod">Modifier</button><button class="hdel">Supprimer</button></div>'+
        '<div class="hitem"><span class="d">'+lbl+'</span><span class="vals"><span class="pp">'+fI(e.patients||0)+' pt</span><span class="mm">'+fE(e.money||0)+'</span></span></div>';
      var item=row.querySelector(".hitem");
      var OPEN=164,startX=0,dx=0,drag=false,lastTouch=0;
      function setOpen(o){item.style.transition="transform .25s";if(o){closeRows(row);row.dataset.open="1";item.style.transform="translateX(-"+OPEN+"px)";}else{row.dataset.open="";item.style.transform="translateX(0)";}}
      function activate(){if(row.dataset.open){setOpen(false);}else{openEdit(k);}}
      item.addEventListener("touchstart",function(ev){startX=ev.touches[0].clientX;dx=0;drag=true;item.style.transition="none";},{passive:true});
      item.addEventListener("touchmove",function(ev){if(!drag)return;dx=ev.touches[0].clientX-startX;var x=Math.min(0,Math.max(-OPEN,(row.dataset.open?-OPEN:0)+dx));item.style.transform="translateX("+x+"px)";},{passive:true});
      item.addEventListener("touchend",function(){if(!drag)return;drag=false;lastTouch=Date.now();item.style.transition="transform .25s";if(Math.abs(dx)<10){activate();}else{setOpen(((row.dataset.open?-OPEN:0)+dx)<-OPEN/2);}},{passive:true});
      item.addEventListener("click",function(){if(Date.now()-lastTouch<600)return;activate();});
      row.querySelector(".hmod").addEventListener("click",function(ev){ev.stopPropagation();openEdit(k);});
      row.querySelector(".hdel").addEventListener("click",function(ev){ev.stopPropagation();delete state.days[k];render();});
      box.appendChild(row);
    });
  }
  function closeRows(except){var rows=document.querySelectorAll(".hrow");for(var i=0;i<rows.length;i++){var r=rows[i];if(r!==except&&r.dataset.open){r.dataset.open="";var it=r.querySelector(".hitem");it.style.transition="transform .25s";it.style.transform="translateX(0)";}}}

  /* ── MODAL GÉNÉRIQUE ────────────────────────────────── */
  var modal=document.getElementById("modal"), sheet=document.getElementById("sheet");
  function closeModal(){modal.hidden=true;sheet.innerHTML="";}
  modal.addEventListener("click",function(e){if(e.target===modal)closeModal();});

  function openAddDay(){
    sheet.innerHTML='<h3>Ajouter un jour</h3>'+
      '<label>Date</label><input id="addDate" type="date" max="'+new Date().toISOString().slice(0,10)+'">'+
      '<label>Patients</label><input id="addP" type="number" inputmode="numeric" placeholder="0" min="0">'+
      '<label>Argent encaissé (€)</label><input id="addM" type="number" inputmode="decimal" placeholder="0" min="0">'+
      '<div class="acts"><button class="btnp ghost" id="addCancel">Annuler</button><button class="btnp save" id="addSave">Enregistrer</button></div>';
    modal.hidden=false;
    document.getElementById("addCancel").onclick=closeModal;
    document.getElementById("addSave").onclick=function(){
      var key=document.getElementById("addDate").value;if(!key)return;
      var pv=Math.max(0,Math.round(parseFloat(document.getElementById("addP").value)||0));
      var mv=Math.max(0,parseFloat(document.getElementById("addM").value)||0);
      if(pv||mv){state.days[key]={patients:pv,money:mv};}
      closeModal();render();
    };
  }
  function openEdit(k){
    var e=state.days[k]||{patients:0,money:0};var p=k.split("-");var dd=new Date(p[0],p[1]-1,p[2]);
    var lbl=dd.toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long"});
    sheet.innerHTML='<h3>'+lbl+'</h3>'+
      '<label>Patients</label><input id="mP" type="number" inputmode="numeric" value="'+(e.patients||0)+'">'+
      '<label>Argent encaissé (€)</label><input id="mM" type="number" inputmode="decimal" value="'+(e.money||0)+'">'+
      '<div class="acts"><button class="btnp ghost" id="mCancel">Annuler</button><button class="btnp save" id="mSave">Enregistrer</button></div>'+
      '<button class="btnp del" id="mDel">Supprimer ce jour</button>';
    modal.hidden=false;
    document.getElementById("mCancel").onclick=closeModal;
    document.getElementById("mSave").onclick=function(){
      var pv=Math.max(0,Math.round(parseFloat(document.getElementById("mP").value)||0));
      var mv=Math.max(0,parseFloat(document.getElementById("mM").value)||0);
      if(!pv&&!mv)delete state.days[k];else state.days[k]={patients:pv,money:mv};
      closeModal();render();
    };
    document.getElementById("mDel").onclick=function(){delete state.days[k];closeModal();render();};
  }

  /* ── FEUILLE RÉGLAGES ───────────────────────────────── */
  function openSettings(){
    editOb    = cfg.objectifs.map(copy);
    editPtmp  = copy(cfg.params);

    var parDef=[
      {id:"sp-base",    lbl:"Base dépenses (équilibre net) €", val:editPtmp.base},
      {id:"sp-jours",   lbl:"Jours travaillés",                val:editPtmp.jours},
      {id:"sp-consult", lbl:"Net / consultation €",            val:editPtmp.netParConsult},
      {id:"sp-urssaf",  lbl:"Taux URSSAF %",                   val:(editPtmp.tauxURSSAF*100).toFixed(2)},
      {id:"sp-carmf",   lbl:"Taux CARMF %",                    val:(editPtmp.tauxCARMF*100).toFixed(2)},
      {id:"sp-abat",    lbl:"Abattement micro-BNC %",          val:(editPtmp.abattement*100).toFixed(2)},
      {id:"sp-biacq",   lbl:"Base imposable acquise €",        val:editPtmp.baseImposableAcquise},
      {id:"sp-plafond", lbl:"Plafond tranche 30 % €",          val:editPtmp.plafond30}
    ];

    var paramsHtml='<div class="cfg-params">';
    parDef.forEach(function(pp){
      paramsHtml+='<div class="cfg-param"><span class="cfg-lbl">'+esc(pp.lbl)+'</span>'+
        '<input id="'+pp.id+'" type="number" step="any" value="'+pp.val+'"></div>';
    });
    paramsHtml+='</div>';

    sheet.className="sheet cfg-sheet";
    sheet.innerHTML=
      '<h3>Réglages</h3>'+
      '<div class="cfg-body">'+
        '<div class="cfg-sec">Objectifs</div>'+
        '<div id="objRows"></div>'+
        '<button class="btn-add-row" id="btnAddObjRow">+ Ajouter un objectif</button>'+
        '<div class="cfg-sec">Paramètres de calcul</div>'+
        paramsHtml+
      '</div>'+
      '<div class="cfg-footer">'+
        '<div class="acts">'+
          '<button class="btnp ghost" id="cfgCancel">Annuler</button>'+
          '<button class="btnp save" id="cfgSave">Enregistrer</button>'+
        '</div>'+
      '</div>';

    modal.hidden=false;
    renderObjRows();
    document.getElementById("cfgCancel").onclick=function(){sheet.className="sheet";closeModal();};
    document.getElementById("cfgSave").onclick=saveSettings;
    document.getElementById("btnAddObjRow").onclick=function(){
      editOb.push({id:Date.now().toString(),nom:"",offset:0});
      renderObjRows();
      var rows=document.querySelectorAll(".obj-edit-row");
      if(rows.length){setTimeout(function(){rows[rows.length-1].querySelector("input").focus();},30);}
    };
  }

  function nomDeOffset(v){
    if(v===0)return"0 €";
    var abs=new Intl.NumberFormat("fr-FR").format(Math.abs(v));
    return(v>0?"+":"−")+abs+" €";
  }

  function renderObjRows(){
    var container=document.getElementById("objRows");
    if(!container)return;
    container.innerHTML="";
    editOb.forEach(function(o,idx){
      var row=document.createElement("div");
      row.className="obj-edit-row";
      row.innerHTML=
        '<input class="obj-edit-offset" type="number" inputmode="numeric" placeholder="Écart net (ex : 5000)" value="'+o.offset+'" data-idx="'+idx+'">'+
        '<button class="obj-del-btn" data-idx="'+idx+'" title="Supprimer">✕</button>';
      row.querySelector('.obj-edit-offset').addEventListener("input",function(e){editOb[+e.target.dataset.idx].offset=parseFloat(e.target.value)||0;});
      row.querySelector(".obj-del-btn").addEventListener("click",function(e){editOb.splice(+e.target.dataset.idx,1);renderObjRows();});
      container.appendChild(row);
    });
  }

  function saveSettings(){
    /* Sync DOM → editOb */
    document.querySelectorAll(".obj-edit-row").forEach(function(row,idx){
      var inp=row.querySelector("input");
      if(editOb[idx]&&inp){editOb[idx].offset=parseFloat(inp.value)||0; editOb[idx].nom=nomDeOffset(editOb[idx].offset);}
    });
    var valid=editOb.filter(function(o){return o.nom;});
    if(!valid.length){return;}
    valid.sort(function(a,b){return a.offset-b.offset;});

    function rN(id){var el=document.getElementById(id);return el?parseFloat(el.value)||0:0;}
    cfg.params={
      base:                rN("sp-base")   ||DPARAMS.base,
      jours:               rN("sp-jours")  ||DPARAMS.jours,
      netParConsult:       rN("sp-consult")||DPARAMS.netParConsult,
      tauxURSSAF:         (rN("sp-urssaf") /100)||DPARAMS.tauxURSSAF,
      tauxCARMF:          (rN("sp-carmf")  /100)||DPARAMS.tauxCARMF,
      abattement:         (rN("sp-abat")   /100)||DPARAMS.abattement,
      baseImposableAcquise:rN("sp-biacq")  ||DPARAMS.baseImposableAcquise,
      plafond30:           rN("sp-plafond")||DPARAMS.plafond30
    };
    cfg.objectifs=valid;
    saveCfg();
    sheet.className="sheet";
    closeModal();
    render();
  }

  /* ── INTERACTIONS ───────────────────────────────────── */
  function buzz(){if(navigator.vibrate){try{navigator.vibrate(8);}catch(e){}}}
  function bump(n){var d=day();d.patients=Math.max(0,(d.patients||0)+n);render();if(n>0)buzz();}
  document.getElementById("plus1").addEventListener("click",function(){bump(1);});
  document.getElementById("plus5").addEventListener("click",function(){bump(5);});
  document.getElementById("minus").addEventListener("click",function(){bump(-1);});
  function commitMoney(){
    var inp=document.getElementById("moneyInput");var v=parseFloat(inp.value);
    if(!isNaN(v)&&v!==0){day().money=Math.max(0,v);inp.value="";render();buzz();}
  }
  document.getElementById("moneyInput").addEventListener("keydown",function(e){if(e.key==="Enter"){commitMoney();this.blur();}});
  document.getElementById("moneyInput").addEventListener("blur",commitMoney);
  document.getElementById("btnAddDay").addEventListener("click",openAddDay);
  document.getElementById("btnSettings").addEventListener("click",openSettings);

  /* ── DÉMARRAGE ──────────────────────────────────────── */
  loadAll();
  render();
})();
</script>
</body>
